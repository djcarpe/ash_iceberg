# Seeds the Iceberg table with synthetic events, generated entirely inside
# DuckDB and INSERTed through the attached REST catalog in 10M-row batches.
# Restart-safe: resumes from the current row count, so a high backoffLimit
# just keeps making forward progress.
apiVersion: batch/v1
kind: Job
metadata:
  name: iceberg-seed
  namespace: iceberg
spec:
  backoffLimit: 50
  template:
    metadata:
      labels:
        app: iceberg-seed
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-catalog
        image: harbor.home/dockerhub-proxy/library/busybox:1.36
        command: ["sh", "-c", "until wget -q -O /dev/null http://iceberg-rest:8181/v1/config; do echo waiting for catalog; sleep 3; done"]
      containers:
      - name: seed
        image: harbor.home/library/iceberg-demo:v5
        command: ["mix", "run", "scripts/seed.exs"]
        env:
        - name: SEED_ROWS
          value: "1000000000"
        - name: SEED_BATCH
          value: "10000000"
        - name: SEED_DAYS
          value: "365"
        - name: SEED_START
          value: "2025-07-09T00:00:00Z"
        - name: ICEBERG_REST_URI
          value: http://iceberg-rest:8181
        - name: S3_WAREHOUSE
          value: s3://lake/iceberg
        - name: S3_ENDPOINT
          value: http://s3.storage:9000
        - name: S3_ACCESS_KEY
          value: any
        - name: S3_SECRET_KEY
          value: any
        - name: S3_REGION
          value: us-east-1
        resources:
          requests: {cpu: "1", memory: 3Gi}
          limits: {cpu: "2", memory: 6Gi}
