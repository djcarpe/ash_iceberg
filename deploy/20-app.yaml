apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-demo
  namespace: iceberg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-demo
  template:
    metadata:
      labels:
        app: iceberg-demo
    spec:
      # The app's DuckDB connection ATTACHes the REST catalog once at boot and
      # falls back to raw iceberg_scan() if it's unreachable — so don't start
      # until the catalog answers.
      initContainers:
      - name: wait-for-catalog
        image: harbor.home/dockerhub-proxy/library/busybox:1.36
        command: ["sh", "-c", "until wget -q -O /dev/null http://iceberg-rest:8181/v1/config; do echo waiting for catalog; sleep 3; done"]
      containers:
      - name: app
        image: harbor.home/library/iceberg-demo:v4
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: "4000"
        - name: ICEBERG_REST_URI
          value: http://iceberg-rest:8181
        - name: S3_WAREHOUSE
          value: s3://lake/iceberg
        - name: S3_ENDPOINT
          value: http://s3.storage:9000
        - name: S3_ACCESS_KEY
          value: any
        - name: S3_SECRET_KEY
          value: any
        - name: S3_REGION
          value: us-east-1
        resources:
          requests: {cpu: 500m, memory: 2Gi}
          limits: {memory: 6Gi}
        readinessProbe:
          httpGet:
            path: /healthz
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-demo
  namespace: iceberg
spec:
  selector:
    app: iceberg-demo
  ports:
  - port: 80
    targetPort: 4000
