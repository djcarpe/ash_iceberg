services:

  # ─── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: iceberg_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - iceberg

  # ─── One-shot: create the "warehouse" bucket ────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: iceberg_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        echo 'Bucket ready.'
      "
    networks:
      - iceberg

  # ─── Iceberg REST Catalog ────────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg_rest
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - iceberg

  # ─── Elixir demo + benchmarks ────────────────────────────────────────────────
  ash-demo:
    build:
      context: .
      dockerfile: demo/Dockerfile
    container_name: iceberg_ash_demo
    depends_on:
      iceberg-rest:
        condition: service_healthy
    environment:
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_WAREHOUSE: s3://warehouse/
    networks:
      - iceberg

networks:
  iceberg:
    driver: bridge
